<!DOCTYPE html>
<html>
<head>
  <title>Responsive Hero Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px;
      min-height: 100vh;
      background-color: #f4f4f4;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .hero-text p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .hero-text button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .hero-image {
      flex: 1;
      text-align: center;
    }

    .hero-image img {
      width: 80%;
      max-width: 400px;
    }

    /* Responsive for Mobile */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 28px;
      }

      .hero-image img {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-text">
      <h1>Welcome to My Website</h1>
      <p>This is a responsive hero section built using Flexbox.</p>
      <button>Get Started</button>
    </div>

    <div class="hero-image">
      <img src="https://via.placeholder.com/400" alt="Hero Image">
    </div>
  </section>

</body>
</html>
